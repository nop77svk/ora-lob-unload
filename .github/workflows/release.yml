name: Release upon version tag in main branch

on:
  push:
    branches:
    - main
    tags:
    - "[0-9]+\\.[0-9]+\\.[0-9]+"

permissions:
  contents: write
  id-token: write
  packages: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - name: Checkout
      uses: actions/checkout@v4
    - name: Generate Changelog
      run: echo "# Good things have arrived" > ${{ github.workspace }}-CHANGELOG.txt
    - name: Set VERSION variable from tag
      run: |
        echo "VERSION=${GITHUB_REF/refs\/tags\//}" >> $GITHUB_ENV
        echo "Triggered by tag ${{ steps.tag.outputs.tag }}, version ${VERSION}"
    - name: Solution clean
      run: dotnet clean -c Release
    - name: NuGet restore
      run: dotnet restore
    - name: Build
      run: dotnet build -c Release --no-restore
    - name: Test
      run: dotnet test -c Release --no-build
    - name: Prepare releases
      run: |
        mkdir _publish.all
    - name: Windows x64 Build
      run: |
        dotnet publish ./OraLobUnload/OraLobUnload.csproj \
            -c Release \
            -o ./_publish.win-x64 \
            -r win-x64 \
            --self-contained \
            -p:UseAppHost=true
        cd ./_publish.win-x64
        cp ../LICENSE .
        zip -r9v ../_publish.all/ora-lob-unload.${VERSION}.win.x64.zip .
        cd ..
    - name: Linux x64 Build
      run: |
        dotnet publish ./OraLobUnload/OraLobUnload.csproj \
            -c Release \
            -o ./_publish.linux-x64 \
            -r linux-x64 \
            --self-contained \
            -p:UseAppHost=true
        cd ./_publish.linux-x64
        cp ../LICENSE .
        zip -r9v ../_publish.all/ora-lob-unload.${VERSION}.linux.x64.zip .
        cd ..
    - name: Portable Build
      run: |
        dotnet publish ./OraLobUnload/OraLobUnload.csproj \
            -c Release \
            -o ./_publish.portable \
            -r win-x64 \
            --no-self-contained \
            -p:PublishTrimmed=false \
            -p:UseAppHost=true
        cd ./_publish.portable
        cp ../LICENSE .
        zip -r9v ../_publish.all/ora-lob-unload.${VERSION}.portable.zip .
        cd ..
    - name: Release All Builds
      uses: softprops/action-gh-release@v1
      if: github.ref_type == 'tag'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        token: "${{ secrets.GITHUB_TOKEN }}"
        body_path: ${{ github.workspace }}-CHANGELOG.txt
        repository: nop77svk/ora-lob-unload
        prerelease: false
        files: |
          ./_publish.all/*.zip
